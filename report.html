  const FALLBACK_EN = `<h2>Executive Summary</h2>
<p>Malaysia\u2019s residential property market presents a study in contradictions entering 2026. Transaction volumes reached a decade high of <strong>420,525 units</strong> in 2024, yet the overhang has rebounded sharply to <strong>44,794 units</strong> including serviced apartments \u2014 a <strong>+30.5% YoY</strong> increase that signals structural oversupply in specific segments. The investment case rests on a positive yield spread of <strong>+2.44%</strong> above OPR, making Malaysian property attractive relative to regional peers, while the primary constraint remains a loan approval rate stuck at <strong>42.6%</strong> that prevents genuine demand from translating into transactions.</p>

<h2>Supply: The Pressure Wave</h2>
<p>The supply picture is defined by a pressure wave still building. Housing starts surged to <strong>106,236 units</strong> in 2024 \u2014 a 20.6% increase \u2014 and these units will complete between 2026 and 2028, arriving into a market already struggling to absorb existing inventory. New completions in Q1\u2013Q3 2025 reached <strong>69,303 units</strong>, up 25.3% year-on-year, yet the high-rise absorption period stretches to <strong>18\u201324 months</strong>, three to four times the six-month benchmark for a healthy market. Developer confidence has collapsed to just <strong>19% optimistic</strong> per REHDA\u2019s 2H2025 survey, and planned new supply for Q1\u2013Q3 2025 fell 31.7% \u2014 a meaningful signal that the pipeline will eventually thin, with supply relief most likely materializing post-2027.</p>

<h2>Demand: Strong Fundamentals, Structural Barriers</h2>
<p>The demand picture is more nuanced than the overhang numbers suggest. The 2024 transaction count of <strong>420,525 units</strong> represents the highest volume in a decade, driven by genuine owner-occupier demand concentrated in the sub-RM500,000 segment. The cooling in Q3 2025 to <strong>66,766 units</strong> (\u22125.2% YoY) reflects a market pausing for breath rather than a fundamental demand collapse. The more telling indicator is the new launch take-up rate: high-rise projects achieved just <strong>5.1% immediate sales</strong> at launch in Q3 2025, versus 14% for landed properties \u2014 a gap that reveals where genuine demand actually sits. The structural barrier is financing: with a loan approval rate of <strong>42.6%</strong> and developers reporting that 64% of buyers face loan rejection, the market\u2019s demand potential significantly exceeds its transactable demand.</p>

<h2>Valuation: Cheap vs Region, Expensive vs Income</h2>
<p>Malaysian property presents a bifurcated valuation picture depending on the framework applied. From a yield perspective, the gross rental yield of <strong>5.19%</strong> against an OPR of <strong>2.75%</strong> produces a positive carry spread of <strong>+2.44%</strong> \u2014 historically a signal of relative value. Compared to regional peers, Kuala Lumpur\u2019s price-to-rent ratio of <strong>21.7x</strong> looks modest against Singapore\u2019s approximately 40x and Hong Kong\u2019s 50x, suggesting KL property is significantly undervalued on a regional comparison basis. The counterargument is the affordability multiple: at <strong>4.3x</strong> median annual household income, Malaysian housing is classified as seriously unaffordable by international standards, and this ceiling constrains the buyer pool regardless of how cheap the market looks to foreign capital.</p>

<h2>KL: A Market in Transition</h2>
<p>Kuala Lumpur\u2019s <strong>\u22124.3% YoY</strong> price decline in Q3 2025 \u2014 the only major Malaysian city recording a fall \u2014 is supply-driven rather than a demand signal. Completions in KL surged 32.7% in Q1\u2013Q3 2025 while new starts declined 14.9%, indicating the market is working through a completion backlog that will clear by 2027. The counterintuitive bright spot is the rental market: average KL rents reached <strong>RM 2,901/month</strong>, up 6.1% year-on-year, as the return of expatriates and urban professionals absorbs rental stock even as purchase demand stalls. This yield expansion \u2014 prices falling while rents rise \u2014 creates the most attractive entry conditions for yield-focused investors in five years. Within KL, the Mid Valley and Old Klang Road corridor offers the best risk-reward at RM400k\u2013800k, while the outer ring dominated by serviced apartments remains structurally challenged by the PSF trap and commercial utility rates.</p>

<h2>Outlook &amp; Key Risks (12-Month View)</h2>
<p>The base case for the next twelve months is continued price stagnation in high-rise urban segments, with landed properties in established corridors showing modest appreciation of 2\u20134%. The completion wave from 2024 starts will keep supply pressure elevated through 2026, limiting capital appreciation upside. The rental market is the more compelling near-term opportunity, with yields continuing to expand as prices correct and rents grow. Three risks could materially alter this thesis: first, an unexpected OPR increase would compress the yield spread and reduce the buyer pool further; second, a significant deterioration in Malaysia\u2019s economic growth \u2014 currently tracking 5% \u2014 would damage household income formation and transaction volumes; third, a policy reversal tightening the MM2H program further would remove a meaningful source of premium residential demand in KL. The actionable insight for investors: the current environment favors yield over capital gains, transit-oriented developments over peripheral launches, and patience over urgency \u2014 the completion wave must clear before the supply-demand balance improves sufficiently to support sustained price recovery.</p>`;

<p>\u5409\u9686\u57612025\u5E74Q3\u623F\u50F9\u5E74\u8DCC<strong>\u22124.3%</strong>\u2014\u2014\u99AC\u4F86\u897F\u4E9E\u4E3B\u8981\u57CE\u5E02\u4E2D\u552F\u4E00\u9304\u5F97\u8DCC\u5E45\u2014\u2014\u662F\u7531\u4F9B\u7D66\u4E3B\u5C0E\uFF0C\u800C\u975E\u9700\u6C42\u8A0A\u865F\u30022025\u5E74\u524D\u4E09\u5B63\u5409\u9686\u5761\u5B8C\u5DE5\u91CF\u6FC0\u589E32.7%\uFF0C\u800C\u65B0\u958B\u5DE5\u91CF\u4E0B\u964D14.9%\uFF0C\u986F\u793A\u5E02\u5834\u6B63\u5728\u6D88\u5316\u4E00\u6279\u9810\u8A08\u57282027\u5E74\u524D\u6E05\u5B8C\u7684\u5B8C\u5DE5\u7A4D\u58D3\u3002\u53CD\u76F4\u89BA\u7684\u4EAE\u9EDE\u5728\u65BC\u79DF\u91D1\u5E02\u5834\uFF1A\u5409\u9686\u5761\u5E73\u5747\u6708\u79DF\u9054<strong>RM 2,901</strong>\uFF0C\u5E74\u589E6.1%\uFF0C\u5916\u7C4D\u4EBA\u58EB\u548C\u57CE\u5E02\u5C08\u696D\u4EBA\u58EB\u7684\u56DE\u6B78\u5438\u6536\u4E86\u79DF\u8CC3\u5B58\u91CF\uFF0C\u5373\u4FBF\u8CFC\u7F6E\u9700\u6C42\u505C\u6EEF\u3002\u9019\u7A2E\u6536\u76CA\u64F4\u5F35\u614B\u52E2\u2014\u2014\u623F\u50F9\u4E0B\u8DCC\u800C\u79DF\u91D1\u4E0A\u6F32\u2014\u2014\u70BA\u6536\u76CA\u578B\u6295\u8CC7\u8005\u5275\u9020\u4E86\u4E94\u5E74\u4F86\u6700\u5177\u5438\u5F15\u529B\u7684\u9032\u5834\u689D\u4EF6\u3002\u5728\u5409\u9686\u5761\u5167\u90E8\uFF0C\u4E2D\u8C37\u548C\u820A\u5DF4\u751F\u8DEF\u8D70\u5ECA\u4EE540\u81F380\u842C\u4EE4\u5409\u7684\u5B9A\u50F9\u63D0\u4F9B\u6700\u4F73\u98A8\u96AA\u56DE\u5831\uFF0C\u800C\u7531\u670D\u52D9\u5F0F\u516C\u5BD3\u4E3B\u5C0E\u7684\u5916\u74B0\u5730\u5340\u4ECD\u56E0\u5468\u50F9\u9677\u9631\u548C\u5546\u696D\u6C34\u96FB\u8CBB\u7387\u554F\u984C\u800C\u9762\u81E8\u7D50\u69CB\u6027\u6311\u6230\u3002</p>

<h2>\u5C55\u671B\u8207\u4E3B\u8981\u98A8\u96AA\uFF08\u672A\u4F8612\u500B\u6708\uFF09</h2>
<p>\u672A\u4F86\u5341\u4E8C\u500B\u6708\u7684\u57FA\u672C\u60C5\u666F\u662F\u9AD8\u5C64\u57CE\u5E02\u4F4F\u5B85\u5340\u6BB5\u7684\u623F\u50F9\u6301\u7E8C\u505C\u6EEF\uFF0C\u800C\u5DF2\u5EFA\u7ACB\u8D70\u5ECA\u7684\u6709\u5730\u4F4F\u5B85\u5C07\u5448\u73FE2\u81F34%\u7684\u6EAB\u548C\u5347\u503C\u30022024\u5E74\u958B\u5DE5\u7684\u5B8C\u5DE5\u6D6A\u6F6E\u5C07\u4F7F\u4F9B\u7D66\u58D3\u529B\u57282026\u5E74\u524D\u7DAD\u6301\u9AD8\u4F4D\uFF0C\u9650\u5236\u8CC7\u672C\u589E\u503C\u7684\u4E0A\u884C\u7A7A\u9593\u3002\u79DF\u91D1\u5E02\u5834\u662F\u8FD1\u671F\u66F4\u5177\u8AAA\u670D\u529B\u7684\u6A5F\u6703\uFF0C\u96A8\u8457\u623F\u50F9\u4FEE\u6B63\u548C\u79DF\u91D1\u589E\u9577\uFF0C\u6536\u76CA\u7387\u5C07\u7E7C\u7E8C\u64F4\u5927\u3002\u4E09\u5927\u98A8\u96AA\u53EF\u80FD\u5BE6\u8CEA\u6027\u6539\u8B8A\u9019\u4E00\u8AD6\u9EDE\uFF1A\u7B2C\u4E00\uFF0C\u9694\u591C\u653F\u7B56\u5229\u7387\u610F\u5916\u4E0A\u5347\u5C07\u58D3\u7E2E\u5229\u5DEE\u4E26\u9032\u4E00\u6B65\u7E2E\u6E1B\u8CB7\u5BB6\u7FA4\u9AD4\uFF1B\u7B2C\u4E8C\uFF0C\u99AC\u4F86\u897F\u4E9E\u7D93\u6FDF\u589E\u9577\u5927\u5E45\u60E1\u5316\u5C07\u640D\u5BB3\u5BB6\u5EAD\u6536\u5165\u5F62\u6210\u548C\u4EA4\u6613\u91CF\uFF1B\u7B2C\u4E09\uFF0CMM2H\u8A08\u756B\u653F\u7B56\u9032\u4E00\u6B65\u6536\u7DCA\u5C07\u524A\u5F31\u5409\u9686\u5761\u9AD8\u7AEF\u4F4F\u5B85\u7684\u91CD\u8981\u9700\u6C42\u4F86\u6E90\u3002\u5C0D\u6295\u8CC7\u8005\u800C\u8A00\uFF0C\u7576\u524D\u74B0\u5883\u6709\u5229\u65BC\u6536\u76CA\u800C\u975E\u8CC7\u672C\u589E\u503C\u3001\u8ECC\u9053\u4EA4\u901A\u5C0E\u5411\u7684\u767C\u5C55\u800C\u975E\u5468\u908A\u63A8\u76E4\uFF0C\u4EE5\u53CA\u8010\u5FC3\u7B49\u5F85\u800C\u975E\u6025\u8FEB\u9032\u5834\u2014\u2014\u5B8C\u5DE5\u6D6A\u6F6E\u5FC5\u9808\u6D88\u5316\u5B8C\u7562\uFF0C\u4F9B\u9700\u5E73\u8861\u624D\u80FD\u5145\u5206\u6539\u5584\u4EE5\u652F\u6490\u6301\u7E8C\u7684\u623F\u50F9\u5FA9\u7526\u3002</p>`;

  const FOOTER_ZH = `<div class="report-footer">
    <p>\u6578\u64DA\u4F86\u6E90\uFF1ANAPIC 2025\u5E74Q3\u3001Global Property Guide 2026\u5E74Q1\u3001\u99AC\u4F86\u897F\u4E9E\u570B\u5BB6\u9280\u884C\u3001\u7D71\u8A08\u5C40\u3001\u623F\u5730\u7522\u767C\u5C55\u5546\u5354\u6703</p>
    <p>\u26A0 \u672C\u5831\u544A\u50C5\u4F9B\u53C3\u8003\uFF0C\u4E0D\u69CB\u6210\u6295\u8CC7\u5EFA\u8B70\u3002</p>
  </div>`;

  /* ── State ── */
  let currentReportLang = 'en';
  const reportCache = { en: null, zh: null };
  const dateStrEN = new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const dateStrZH = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long' });

  /* ── API Prompts ── */
  const MARKET_DATA = `MACRO DATA:

  const SYSTEM_EN = 'You are a senior real estate analyst writing an institutional-grade market report. Write in clear, direct analytical prose. Lead with the most important insight. Use specific data points to support every argument. Express clear views. Structure your output as clean HTML using only these tags: <h2> for section headers, <p> for paragraphs, <strong> for key data points and numbers. Do not use bullet points, <ul>, <li>, or markdown. Write in flowing analytical prose only.';
  const SYSTEM_ZH = '\u4F60\u662F\u4E00\u4F4D\u8CC7\u6DF1\u623F\u5730\u7522\u5206\u6790\u5E2B\uFF0C\u5C08\u9580\u64B0\u5BEB\u6A5F\u69CB\u7D1A\u5225\u7684\u5E02\u5834\u7814\u7A76\u5831\u544A\u3002\u8ACB\u7528\u6D41\u66A2\u3001\u5C08\u696D\u7684\u7E41\u9AD4\u4E2D\u6587\u76F4\u63A5\u64B0\u5BEB\uFF0C\u4E0D\u8981\u7FFB\u8B6F\u82F1\u6587\u3002\u4F7F\u7528\u5206\u6790\u5E2B\u7684\u8A9E\u6C23\uFF1A\u6709\u8AD6\u9EDE\u3001\u6709\u6578\u64DA\u652F\u6490\u3001\u6709\u660E\u78BA\u89C0\u9EDE\u3002\u7528 <h2> \u4F5C\u70BA\u6BB5\u843D\u6A19\u984C\uFF0C<p> \u4F5C\u70BA\u6BB5\u843D\uFF0C<strong> \u6A19\u6CE8\u95DC\u9375\u6578\u64DA\u3002\u4E0D\u8981\u4F7F\u7528\u689D\u5217\u5F0F\uFF0C\u7528\u9023\u8CAB\u7684\u6563\u6587\u6BB5\u843D\u3002';

  const PROMPT_EN = `Write a Malaysia residential property market analysis report based on the following data.\nDate: ${dateStrEN}\n\n${MARKET_DATA}\n\nWrite the report with exactly these 6 sections:\n1. Executive Summary\n2. Supply: The Pressure Wave\n3. Demand: Strong Fundamentals, Structural Barriers\n4. Valuation: Cheap vs Region, Expensive vs Income\n5. KL: A Market in Transition\n6. Outlook & Key Risks (12-Month View)`;
  const PROMPT_ZH = `\u8ACB\u6839\u64DA\u4EE5\u4E0B\u99AC\u4F86\u897F\u4E9E\u4F4F\u5B85\u623F\u5730\u7522\u5E02\u5834\u6578\u64DA\uFF0C\u64B0\u5BEB\u4E00\u4EFD\u5B8C\u6574\u7684\u5E02\u5834\u5206\u6790\u5831\u544A\uFF0C\u5831\u544A\u65E5\u671F\uFF1A${dateStrZH}\n\n${MARKET_DATA}\n\n\u5831\u544A\u7D50\u69CB\uFF1A\n1. \u57F7\u884C\u6458\u8981\uFF083\u81F34\u53E5\u8A71\uFF0C\u9EDE\u51FA\u6700\u91CD\u8981\u7684\u6838\u5FC3\u8AD6\u9EDE\uFF09\n2. \u4F9B\u7D66\uFF1A\u58D3\u529B\u6CE2\uFF08\u5206\u6790\u7BA1\u7DDA\u3001\u5B8C\u5DE5\u91CF\u6FC0\u589E\u3001\u7A4D\u58D3\u554F\u984C\uFF09\n3. \u9700\u6C42\uFF1A\u57FA\u672C\u9762\u5F37\u52C1\uFF0C\u7D50\u69CB\u6027\u969C\u7919\uFF08\u4EA4\u6613\u91CF\u3001\u8CB8\u6B3E\u62D2\u6279\u3001\u53EF\u8CA0\u64D4\u6027\uFF09\n4. \u4F30\u503C\uFF1A\u5340\u57DF\u4FBF\u5B9C\uFF0C\u76F8\u5C0D\u6536\u5165\u6602\u8CB4\uFF08\u5229\u5DEE\u3001\u623F\u50F9\u79DF\u91D1\u6BD4\u3001\u4E9E\u592A\u6BD4\u8F03\uFF09\n5. \u5409\u9686\u5761\uFF1A\u8F49\u578B\u4E2D\u7684\u5E02\u5834\uFF08\u623F\u50F9\u4FEE\u6B63\u3001\u79DF\u91D1\u589E\u9577\u3001\u4E09\u500B\u5340\u57DF\u5206\u6790\uFF09\n6. \u5C55\u671B\u8207\u4E3B\u8981\u98A8\u96AA\uFF0812\u500B\u6708\u524D\u77BB\u3001\u4E09\u5927\u98A8\u96AA\u3001\u4E00\u500B\u53EF\u57F7\u884C\u6D1E\u898B\uFF09`;

  /* ── Generate Report ── */
  async function generateReport(lang) {
    const contentEl = document.getElementById('report-content');
    currentReportLang = lang;
    updateReportMeta(lang);

    // Check cache
    if (reportCache[lang]) {
      contentEl.innerHTML = reportCache[lang];
      return;
    }

    // Show loading
    contentEl.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>${lang === 'zh' ? '\u6B63\u5728\u751F\u6210\u5E02\u5834\u5206\u6790\u4E2D...' : 'Generating market analysis...'}</p></div>`;

    const apiKey = window.location.hash.slice(1);
    if (!apiKey || !apiKey.startsWith('sk-ant-')) {
      const fallback = lang === 'zh' ? FALLBACK_ZH : FALLBACK_EN;
      const footer = lang === 'zh' ? FOOTER_ZH : FOOTER_EN;
      const noteEN = 'No API key provided. Showing pre-written analysis.<br>To enable live AI generation, append your key: <code>report.html#sk-ant-...</code>';
      const noteZH = '\u672A\u63D0\u4F9BAPI\u91D1\u9470\u3002\u986F\u793A\u9810\u5BEB\u5206\u6790\u3002<br>\u555F\u7528AI\u5373\u6642\u751F\u6210\uFF1A<code>report.html#sk-ant-...</code>';
      const html = `<div class="api-note">${lang === 'zh' ? noteZH : noteEN}</div>` + fallback + footer;
      reportCache[lang] = html;
      contentEl.innerHTML = html;
      return;
    }

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2000,
          system: lang === 'zh' ? SYSTEM_ZH : SYSTEM_EN,
          messages: [{ role: 'user', content: lang === 'zh' ? PROMPT_ZH : PROMPT_EN }]
        })
      });
      if (!response.ok) throw new Error('API returned ' + response.status);
      const data = await response.json();
      const footer = lang === 'zh' ? FOOTER_ZH : FOOTER_EN;
      const html = data.content[0].text + footer;
      reportCache[lang] = html;
      if (currentReportLang === lang) contentEl.innerHTML = html;

      const fallback = lang === 'zh' ? FALLBACK_ZH : FALLBACK_EN;
      const footer = lang === 'zh' ? FOOTER_ZH : FOOTER_EN;
      const errMsg = lang === 'zh' ? 'AI\u751F\u6210\u4E0D\u53EF\u7528 (' + err.message + ')\u3002\u986F\u793A\u9810\u5BEB\u5206\u6790\u3002' : 'Live AI generation unavailable (' + err.message + '). Showing pre-written analysis.';
      const html = `<div class="api-note">${errMsg}</div>` + fallback + footer;
      reportCache[lang] = html;
      if (currentReportLang === lang) contentEl.innerHTML = html;
    }
  }

  /* ── Language change callback ── */
  function onLanguageChange(lang) {
    generateReport(lang);
  }

  /* ── Init ── */
  updateReportMeta('en');
  generateReport('en');
  initLanguage();
  </script>
