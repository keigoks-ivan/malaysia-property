name: Daily RS+VCP Screener

on:
  schedule:
    # Every weekday (Mon-Fri) at 22:00 UTC = 06:00 Taiwan next day (after US market close)
    - cron: "0 22 * * 1-5"
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests lxml

      - name: Run screener
        id: screener
        run: python scripts/screener.py --quick

      - name: Commit and push if changed
        if: steps.screener.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screener/
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "data: screener update ${DATE}

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push
