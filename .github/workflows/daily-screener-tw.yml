name: Daily TW RS+VCP Screener

on:
  schedule:
    # Mon-Fri 08:00 UTC = 16:00 Taiwan time (after TW market close 13:30)
    # If TW market holiday, yfinance returns last trading day's data automatically
    - cron: "0 8 * * 1-5"
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  run-tw-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run TW screener
        id: screener
        run: python scripts/screener_tw.py

      - name: Commit and push if changed
        if: steps.screener.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screener/
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "data: TW screener update ${DATE}

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push
