name: Weekly Market Data Update

on:
  schedule:
    # Every Saturday 00:00 UTC = Saturday 08:00 Taiwan time (UTC+8)
    - cron: "0 0 * * 6"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-markets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run market data updater
        id: updater
        run: python scripts/update_markets.py

      - name: Commit and push if changed
        if: steps.updater.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reits.html
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "data: weekly REIT update ${DATE}

          Auto-updated REIT dividend yields and market caps via yfinance.
          PE/PB/P-NAV/outlook unchanged (requires manual review).

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push
