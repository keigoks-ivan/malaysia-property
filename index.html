<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malaysia Property Monitor</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="logo">Malaysia Property Monitor</a>
    <nav>
      <a href="index.html" class="active">Dashboard</a>
      <a href="supply.html">Supply</a>
      <a href="demand.html">Demand</a>
      <a href="regions.html">Regions</a>
    </nav>
  </header>

  <main class="container">
    <div class="page-header">
      <span class="updated-badge" id="updated-date">Loading...</span>
      <h1>Market Overview</h1>
      <p class="subtitle">Malaysia residential property supply &amp; demand dashboard</p>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="label">OPR Rate</div>
        <div class="value" id="kpi-opr">--</div>
      </div>
      <div class="kpi-card">
        <div class="label">Q4 Transactions</div>
        <div class="value" id="kpi-transactions">--</div>
      </div>
      <div class="kpi-card">
        <div class="label">National Overhang</div>
        <div class="value" id="kpi-overhang">--</div>
      </div>
      <div class="kpi-card">
        <div class="label">KL Median Price</div>
        <div class="value" id="kpi-kl-price">--</div>
      </div>
    </div>

    <div class="chart-grid two-col">
      <div class="chart-card">
        <h3>Supply vs Demand Trend</h3>
        <canvas id="chart-supply-demand"></canvas>
      </div>
      <div class="chart-card">
        <h3>MHPI House Price Index</h3>
        <canvas id="chart-mhpi"></canvas>
      </div>
    </div>
  </main>

  <footer class="footer">
    <span id="updated-date-footer"></span> &middot; A project by <a href="https://investmquest.com" target="_blank">InvestMQuest</a>
  </footer>

  <script src="js/main.js"></script>
  <script>initDashboard();</script>
</body>
</html>
